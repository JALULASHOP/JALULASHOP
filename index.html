<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Suspendida</title>
    <style>
        /* ===== CONTEXTO GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050508; /* Fondo negro profundo */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* ===== CONTENEDOR CENTRAL ===== */
        .pantalla-suspension {
            text-align: center;
            padding: 20px;
            animation: aparecer 1.2s ease-out-inforward;
        }

        /* ===== EL LOGO (SVG ANIMADO) ===== */
        .logo-alerta {
            width: 120px; /* Tamaño imponente para el logo */
            height: 120px;
            fill: #ff2a2a; /* Rojo brillante */
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 42, 42, 0.6));
            animation: pulsoNeon 2.5s infinite ease-in-out;
        }

        /* ===== TEXTO PRINCIPAL ===== */
        h1.titulo-estado {
            color: #ff2a2a;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 42, 42, 0.4);
        }

        /* ===== ANIMACIONES ===== */
        @keyframes pulsoNeon {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(255, 42, 42, 0.6));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 30px rgba(255, 42, 42, 0.9));
            }
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ajuste para pantallas de celulares */
        @media (max-width: 480px) {
            .logo-alerta {
                width: 90px;
                height: 90px;
            }
            h1.titulo-estado {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="pantalla-suspension">
        <svg class="logo-alerta" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>

        <h1 class="titulo-estado">Página Suspendida</h1>
    </div>

</body>
</html>
